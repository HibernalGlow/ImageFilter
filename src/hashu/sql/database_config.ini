# 图片哈希数据库配置文件
# 这个文件包含了数据库连接和功能的配置选项

[database]
# PostgreSQL 连接配置
host = localhost
port = 5432
user = postgres
password = 
database = image_hashes

# 连接池配置
min_connections = 1
max_connections = 20

# 连接超时 (秒)
connection_timeout = 30

[features]
# 启用新的查询功能
enable_format_priority_search = true

# 启用自动URI解析
enable_auto_uri_parsing = true

# 启用统计信息缓存
enable_stats_cache = true

# 优先的图片格式列表 (用于格式优先查询)
preferred_formats = jpg,png,webp,avif

[performance]
# 批量插入的批次大小
batch_insert_size = 1000

# 查询结果缓存大小
query_cache_size = 10000

# 是否启用查询优化
enable_query_optimization = true

[logging]
# 日志级别 (DEBUG, INFO, WARNING, ERROR)
log_level = INFO

# 是否记录SQL查询
log_queries = false

# 是否记录性能指标
log_performance = true

[migration]
# 迁移时是否备份原数据
backup_before_migration = true

# 迁移失败时是否继续
continue_on_error = false

# 迁移时的批次大小
migration_batch_size = 500

[maintenance]
# 自动清理重复记录的间隔 (小时)
auto_cleanup_interval = 24

# 自动优化数据库的间隔 (小时)
auto_optimize_interval = 168  # 7天

# 是否启用自动维护
enable_auto_maintenance = false

[security]
# 是否启用SSL连接
use_ssl = false

# SSL证书路径
ssl_cert_path = 

# SSL密钥路径
ssl_key_path = 

[backup]
# 自动备份的间隔 (小时)
auto_backup_interval = 72  # 3天

# 备份文件保存路径
backup_directory = ./backups

# 备份文件保留天数
backup_retention_days = 30

# 是否启用自动备份
enable_auto_backup = false
